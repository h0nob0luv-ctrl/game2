<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>くだものもりもり</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #e2d9c8; font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #game-container { 
            position: relative; width: 400px; height: 700px; 
            background: #dbd2bf; border: 4px solid #5d4037; 
            box-sizing: border-box; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        #limit-line {
            position: absolute; top: 180px; left: 50px; width: 300px;
            border-top: 3px dashed #e57373; z-index: 5; display: none;
        }

        #base-platform {
            position: absolute; bottom: 110px; left: 50px; width: 300px; height: 30px;
            background: #8d6e63; border: 3px solid #5d4037; border-radius: 8px;
            z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .fruit-element {
            position: absolute; display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 10; will-change: transform; line-height: 1;
        }

        #score-ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            font-size: 48px; font-weight: bold; color: #5d4037; z-index: 50; pointer-events: none; 
        }

        #start-screen, #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(226, 217, 200, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }
        
        h1 { color: #5d4037; font-size: 42px; margin: 0 0 10px 0; }
        .rule { color: #795548; font-size: 15px; margin-bottom: 20px; line-height: 1.6; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn-main {
            padding: 15px 45px; font-size: 20px; font-weight: bold; color: #fff;
            background: #a1887f; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px #5d4037; outline: none; transition: 0.1s; min-width: 200px;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px #5d4037; }
        .btn-goal { background: #81c784; box-shadow: 0 5px #388e3c; }
        .btn-goal:active { box-shadow: 0 2px #388e3c; }

        #controls {
            position: absolute; bottom: 25px; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 60;
        }
        .ctrl-btn {
            width: 70px; height: 70px; border-radius: 50%; background: #f5f5f5;
            border: 3px solid #fff; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 32px; box-shadow: 0 4px #ccc;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { transform: translateY(2px); box-shadow: none; }
        
        #guide-emoji {
            position: absolute; top: 70px; font-size: 40px; z-index: 5;
            transition: left 0.1s ease-out;
        }

        #mode-badge {
            position: absolute; top: 10px; right: 10px; padding: 5px 10px;
            background: #5d4037; color: white; border-radius: 5px; font-size: 12px; z-index: 50;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="mode-badge" style="display:none"></div>
    <div id="score-ui">0</div>
    <div id="guide-emoji">🍓</div>
    <div id="limit-line"></div>
    <div id="base-platform"></div>

    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>くだもの<br>もりもり</h1>
        <p class="rule">🍓→🍇→🍎→🍍→🍉<br>カゴからはみ出さないように！</p>
        <div class="btn-group">
            <button class="btn-main" onclick="startGame('endless')">ENDLESS</button>
            <button class="btn-main btn-goal" onclick="startGame('goal')">GOAL (2500pts)</button>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" style="display: none;">
        <h1 id="result-title">GAME OVER</h1>
        <p id="final-score" style="font-size: 24px; color: #5d4037; margin-bottom: 20px;"></p>
        <button class="btn-main" onclick="location.reload()">RETRY</button>
    </div>

    <div id="controls">
        <div class="ctrl-btn" onmousedown="moveLeft()" ontouchstart="moveLeft()">◀</div>
        <div class="ctrl-btn" style="color: #bc84ee;" onmousedown="dropFruit()" ontouchstart="dropFruit()">●</div>
        <div class="ctrl-btn" onmousedown="moveRight()" ontouchstart="moveRight()">▶</div>
    </div>
</div>

<script>
const FRUIT_DEFS = [
    { label: '🍓', type: 'circle', radius: 18 },
    { label: '🍇', type: 'circle', radius: 26 },
    { label: '🍎', type: 'circle', radius: 26 },
    { label: '🍍', type: 'rect',   w: 55, h: 75 },
    { label: '🍉', type: 'rect',   w: 95, h: 75 },
    { label: '😊', type: 'circle', radius: 65 } 
];

const { Engine, Runner, Bodies, Composite, Events, Collision } = Matter;

let engine, runner;
const width = 400;
const height = 700;
const LIMIT_Y = 180;
const GOAL_SCORE = 2500; // ゴールモードの目標スコア

let score = 0;
let currentX = 200;
let gameState = 'START';
let gameMode = 'endless'; 
let nextFruitIdx = 0;
let gameOverTimer = 0;

const fruitMap = new Map();
let mergeQueue = [];

function startGame(mode) {
    gameMode = mode;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('limit-line').style.display = 'block';
    
    const badge = document.getElementById('mode-badge');
    badge.style.display = 'block';
    badge.innerText = mode === 'goal' ? `GOAL: ${GOAL_SCORE}` : 'ENDLESS';

    gameState = 'PLAYING';
    pickNext();

    engine = Engine.create();
    runner = Runner.create();

    const floor = Bodies.rectangle(200, 575, 300, 30, {
        isStatic: true, friction: 0.8, label: 'floor'
    });
    
    Composite.add(engine.world, [floor]);

    Events.on(engine, 'afterUpdate', () => {
        if (gameState !== 'PLAYING') return;

        // ゴール判定
        if (gameMode === 'goal' && score >= GOAL_SCORE) {
            endGame(true);
            return;
        }

        let isOverLimit = false;
        fruitMap.forEach((el, body) => {
            const { x, y } = body.position;
            el.style.transform = `translate(${x}px, ${y}px) rotate(${body.angle}rad)`;

            if (y > height || x < -50 || x > width + 50) {
                removeFruit(body);
                return;
            }

            if (y < LIMIT_Y && body.velocity.y < 0.1) {
                isOverLimit = true;
            }
        });

        if (isOverLimit) {
            gameOverTimer++;
            if (gameOverTimer > 180) endGame(false);
        } else {
            gameOverTimer = 0;
        }

        if (mergeQueue.length > 0) {
            mergeQueue.forEach(task => {
                const targets = task.bodies;
                if (targets.every(b => Composite.allBodies(engine.world).includes(b))) {
                    const midX = targets.reduce((s, b) => s + b.position.x, 0) / targets.length;
                    const midY = targets.reduce((s, b) => s + b.position.y, 0) / targets.length;
                    targets.forEach(b => removeFruit(b));
                    addFruit(midX, midY, task.nextIdx, task.isMega, task.forceSmile);
                    updateScore(task.score);
                }
            });
            mergeQueue = [];
        }
    });

    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach((pair) => {
            const { bodyA, bodyB } = pair;
            if (bodyA.fIdx !== undefined && bodyA.fIdx === bodyB.fIdx) {
                const idx = bodyA.fIdx;
                if (idx === 4 && bodyA.isMega && bodyB.isMega) {
                    mergeQueue.push({ bodies: [bodyA, bodyB], nextIdx: 5, score: 5000, isMega: false, forceSmile: true });
                } else if (idx < 4) {
                    mergeQueue.push({ bodies: [bodyA, bodyB], nextIdx: idx + 1, score: (idx + 1) * 100, isMega: false });
                } else if (idx === 4 && !bodyA.isMega && !bodyB.isMega) {
                    const group = findContactGroup(bodyA, new Set());
                    if (group.size >= 3) {
                        mergeQueue.push({ bodies: Array.from(group), nextIdx: 4, score: 1000, isMega: true });
                    }
                }
            }
        });
    });

    Runner.run(runner, engine);
}

function endGame(isClear) {
    gameState = 'GAMEOVER';
    const screen = document.getElementById('result-screen');
    const title = document.getElementById('result-title');
    
    screen.style.display = 'flex';
    document.getElementById('final-score').innerText = "SCORE: " + score;
    
    if (isClear) {
        title.innerText = "✨ CLEAR ✨";
        title.style.color = "#4caf50";
    } else {
        title.innerText = "GAME OVER";
        title.style.color = "#e57373";
    }
    
    Runner.stop(runner);
}

function findContactGroup(body, visited) {
    visited.add(body);
    const others = Composite.allBodies(engine.world).filter(b => b.fIdx === 4 && !b.isMega && !visited.has(b));
    for (let other of others) {
        if (Collision.collides(body, other)) findContactGroup(other, visited);
    }
    return visited;
}

function addFruit(x, y, idx, isMega = false, forceSmile = false) {
    let finalIdx = forceSmile ? 5 : idx;
    const data = FRUIT_DEFS[finalIdx];
    const scale = isMega ? 1.7 : 1.0;
    
    const opt = { 
        restitution: 0.1, friction: 0.5,
        density: (finalIdx + 1) * 0.001 
    };

    let body;
    if (data.type === 'circle') {
        body = Bodies.circle(x, y, data.radius * scale, opt);
    } else {
        body = Bodies.rectangle(x, y, data.w * scale, data.h * scale, opt);
    }
    
    body.fIdx = finalIdx;
    body.isMega = isMega;

    const el = document.createElement('div');
    el.className = 'fruit-element';
    el.innerText = data.label;
    
    const fontSize = (data.type === 'circle' ? data.radius * 2.3 : data.w * 1.1) * scale;
    el.style.fontSize = fontSize + 'px';
    el.style.width = '1px'; el.style.height = '1px';
    
    document.getElementById('game-container').appendChild(el);
    fruitMap.set(body, el);
    Composite.add(engine.world, body);
}

function removeFruit(body) {
    const el = fruitMap.get(body);
    if (el) el.remove();
    fruitMap.delete(body);
    Composite.remove(engine.world, body);
}

function dropFruit() {
    if (gameState !== 'PLAYING') return;
    const dropX = Math.max(70, Math.min(330, currentX));
    addFruit(dropX, 100, nextFruitIdx);
    updateScore(10);
    pickNext();
}

function pickNext() {
    nextFruitIdx = Math.floor(Math.random() * 3);
    updateGuide();
}

function updateGuide() {
    const guide = document.getElementById('guide-emoji');
    guide.innerText = FRUIT_DEFS[nextFruitIdx].label;
    guide.style.left = (currentX - 20) + 'px';
}

function moveLeft() { 
    currentX = Math.max(70, currentX - 30); 
    updateGuide();
}
function moveRight() { 
    currentX = Math.min(330, currentX + 30); 
    updateGuide();
}

function updateScore(v) {
    score += v;
    document.getElementById('score-ui').innerText = score;
}
</script>
</body>
</html>
